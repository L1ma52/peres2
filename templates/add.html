{% extends 'base.html' %}

{% block title %}Добавить запись - СТО{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Добавить новый заказ</h2>
</div>

<form method="POST" action="{{ url_for('add_service') }}" class="service-form">
    <div class="form-group">
        <label for="client_name">Имя клиента:</label>
        <input type="text" id="client_name" name="client_name" required placeholder="Иван Иванов">
    </div>

    <div class="form-group">
        <label for="car_model">Модель автомобиля:</label>
        <input type="text" id="car_model" name="car_model" required placeholder="Toyota Camry">
    </div>

    <div class="form-group">
        <label for="service_type">Тип услуги:</label>
        <input type="text" id="service_type" name="service_type" required placeholder="Замена масла, Диагностика">
    </div>

    <div class="form-group">
        <label for="price">Цена (₽):</label>
        <input type="number" id="price" name="price" step="0.01" min="0" placeholder="5000.00">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Добавить</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
    </div>
</form>

{% endblock %}
