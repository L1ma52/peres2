{% extends 'base.html' %}

{% block title %}Редактировать запись - СТО{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Редактировать заказ #{{ service.id }}</h2>
</div>

<form method="POST" action="{{ url_for('update_service', id=service.id) }}" class="service-form">
    <div class="form-group">
        <label for="client_name">Имя клиента:</label>
        <input type="text" id="client_name" name="client_name" value="{{ service.client_name }}" required>
    </div>

    <div class="form-group">
        <label for="car_model">Модель автомобиля:</label>
        <input type="text" id="car_model" name="car_model" value="{{ service.car_model }}" required>
    </div>

    <div class="form-group">
        <label for="service_type">Тип услуги:</label>
        <input type="text" id="service_type" name="service_type" value="{{ service.service_type }}" required>
    </div>

    <div class="form-group">
        <label for="price">Цена (₽):</label>
        <input type="number" id="price" name="price" step="0.01" min="0" value="{{ service.price }}">
    </div>

    <div class="form-group">
        <label for="status">Статус:</label>
        <select id="status" name="status" required>
            <option value="В ожидании" {% if service.status == 'В ожидании' %}selected{% endif %}>В ожидании</option>
            <option value="В работе" {% if service.status == 'В работе' %}selected{% endif %}>В работе</option>
            <option value="Завершено" {% if service.status == 'Завершено' %}selected{% endif %}>Завершено</option>
            <option value="Отменено" {% if service.status == 'Отменено' %}selected{% endif %}>Отменено</option>
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
    </div>
</form>

{% endblock %}
